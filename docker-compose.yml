services:
  softether:
    image: ghcr.io/2061969365/softether-gateway:latest
    container_name: softether
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      # --- 认证（post-init.sh 使用这些环境变量，entrypoint 的已失效） ---
      - PSK=${PSK}
      - USERS=${USER_NAME}:${USER_PASSWORD}
      - SPW=${SERVER_PASSWORD}
      - HPW=${HUB_PASSWORD}


    volumes:
      - ./data:/usr/vpnserver
    healthcheck:
      test: ["CMD", "vpncmd", "localhost:5555", "/SERVER", "/PASSWORD:${SERVER_PASSWORD}", "/CMD", "ServerStatusGet"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
