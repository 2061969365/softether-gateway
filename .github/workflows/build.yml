name: Build, Test & Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: softether-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container and test initialization
        run: |
          echo "===== 启动容器 ====="
          docker run -d --name softether-test \
            --privileged \
            --cap-add NET_ADMIN \
            -e PSK=testpsk123 \
            -e USERS=testuser:testpass123 \
            -e SPW=serverpass123 \
            -e HPW=hubpass123 \
            -e "VPNCMD_SERVER=ListenerDelete 443" \
            softether-test:latest

          echo "===== 等待初始化完成（最多120秒） ====="
          for i in $(seq 1 120); do
            if docker logs softether-test 2>&1 | grep -q "initial setup OK\|running with existing config"; then
              echo "✅ 初始化完成（${i}秒）"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "❌ 超时120秒，初始化未完成"
              docker logs softether-test 2>&1 | tail -30
              exit 1
            fi
            sleep 1
          done

          echo ""
          echo "===== 容器日志 ====="
          docker logs softether-test 2>&1

      - name: Verify port 5555 is listening
        run: |
          echo "===== 检查端口5555 ====="
          # /proc/net/tcp 列说明:
          #   $2 = local_address (hex:port)
          #   $4 = st (state), 0A=LISTEN, 01=ESTABLISHED, 06=TIME_WAIT
          # 只提取 LISTEN 状态的端口号，排除出站连接(TIME_WAIT)的误报
          LISTEN_PORTS=$(docker exec softether-test sh -c "cat /proc/net/tcp" | awk 'NR>1 && $4=="0A" { split($2,a,":"); print a[2] }')
          if echo "$LISTEN_PORTS" | grep -q "^15B3$"; then
            echo "✅ 端口5555(0x15B3)已监听"
          else
            echo "❌ 端口5555未监听"
            docker exec softether-test sh -c "cat /proc/net/tcp"
            exit 1
          fi

      - name: Verify 443 and 992 are NOT listening
        run: |
          echo "===== 检查443和992已删除 ====="
          # /proc/net/tcp 列说明:
          #   $2 = local_address (hex:port)
          #   $4 = st (state), 0A=LISTEN, 01=ESTABLISHED, 06=TIME_WAIT
          # 只提取 LISTEN 状态的端口号，排除出站连接(TIME_WAIT)的误报
          LISTEN_PORTS=$(docker exec softether-test sh -c "cat /proc/net/tcp" | awk 'NR>1 && $4=="0A" { split($2,a,":"); print a[2] }')
          if echo "$LISTEN_PORTS" | grep -q -e "^01BB$" -e "^03E0$"; then
            echo "❌ 443(01BB)或992(03E0)端口仍在LISTEN状态"
            docker exec softether-test sh -c "cat /proc/net/tcp"
            exit 1
          else
            echo "✅ 443和992已成功删除"
          fi

      - name: Verify Virtual Hub and user exist
        run: |
          echo "===== 检查Hub和用户 ====="
          HUB_LIST=$(docker exec softether-test vpncmd localhost /SERVER /PASSWORD:serverpass123 /CSV /CMD EnumHub 2>&1)
          echo "Hub列表: $HUB_LIST"
          if echo "$HUB_LIST" | grep -q "DEFAULT"; then
            echo "✅ Virtual Hub DEFAULT 存在"
          else
            echo "❌ Virtual Hub DEFAULT 未找到"
            exit 1
          fi

          USER_LIST=$(docker exec softether-test vpncmd localhost /SERVER /PASSWORD:serverpass123 /HUB:DEFAULT /CSV /CMD UserList 2>&1)
          echo "用户列表: $USER_LIST"
          if echo "$USER_LIST" | grep -q "testuser"; then
            echo "✅ 用户 testuser 存在"
          else
            echo "❌ 用户 testuser 未找到"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker rm -f softether-test 2>/dev/null || true
          docker rmi softether-test:latest 2>/dev/null || true

  push:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
